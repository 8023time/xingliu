version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: xingliu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xingliu
      POSTGRES_PASSWORD: xingliu_password
      POSTGRES_DB: xingliu_db
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=zh_CN.UTF-8'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U xingliu']
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 NestJS 服务
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: xingliu-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://xingliu:xingliu_password@postgres:5432/xingliu_db
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      ALIYUN_GREEN_ENDPOINT: ${ALIYUN_GREEN_ENDPOINT}
      ALIYUN_GREEN_TEXT_SERVICE: ${ALIYUN_GREEN_TEXT_SERVICE}
      ALIYUN_GREEN_IMAGE_SERVICE: ${ALIYUN_GREEN_IMAGE_SERVICE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  # Web 应用 (Next.js)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: xingliu-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api.xingliou.8023time.com}
    ports:
      - '8080:8080'
    depends_on:
      - server

  # Admin 应用 (React + Vite)
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: xingliu-admin
    restart: unless-stopped
    environment:
      PORT: 8081
      ADMIN_API_URL: ${ADMIN_API_URL:-http://localhost:3000}
    ports:
      - '8081:8081'
    depends_on:
      - server

  # Caddy 反向代理
  caddy:
    image: caddy:latest
    container_name: xingliu-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      ACME_AGREE: 'true'
    depends_on:
      - web
      - admin
      - server

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
