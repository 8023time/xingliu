version: '3.8'

services:
  # PostgreSQL 数据库 (生产配置)
  postgres:
    image: postgres:16-alpine
    container_name: xingliu-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-xingliu}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-xingliu_db}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=zh_CN.UTF-8'
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-xingliu}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xingliu_network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  minio:
    image: minio/minio:latest
    container_name: xingliu-minio-prod
    restart: always
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data_prod:/data
    expose:
      - '9000'
    networks:
      - xingliu_network

  # 后端服务 (生产配置)
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: xingliu-server-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-xingliu}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-xingliu_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-xingliu-assets}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      ALIYUN_GREEN_ENDPOINT: ${ALIYUN_GREEN_ENDPOINT}
      ALIYUN_GREEN_TEXT_SERVICE: ${ALIYUN_GREEN_TEXT_SERVICE}
      ALIYUN_GREEN_IMAGE_SERVICE: ${ALIYUN_GREEN_IMAGE_SERVICE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - xingliu_network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api']
      interval: 30s
      timeout: 10s
      retries: 3

  # Web 应用 (生产配置)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: xingliu-web-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 8080
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - '8080'
    depends_on:
      - server
    networks:
      - xingliu_network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Admin 应用 (生产配置)
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: xingliu-admin-prod
    restart: always
    environment:
      ADMIN_API_URL: ${ADMIN_API_URL}
    expose:
      - '8081'
    networks:
      - xingliu_network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Caddy 反向代理 (生产配置)
  caddy:
    image: caddy:latest
    container_name: xingliu-caddy-prod
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      ACME_AGREE: 'true'
    depends_on:
      - web
      - admin
      - server
    networks:
      - xingliu_network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres_data_prod:
  minio_data_prod:
  caddy_data:
  caddy_config:

networks:
  xingliu_network:
    driver: bridge
