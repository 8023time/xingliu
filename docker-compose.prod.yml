services:
  postgres:
    image: postgres:16-alpine
    container_name: xingliu-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-xingliu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-xingliu_db}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xingliu_network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  minio:
    image: minio/minio:latest
    container_name: xingliu-minio-prod
    restart: always
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data_prod:/data
    expose:
      - '9000'
    networks:
      - xingliu_network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: xingliu-server-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-xingliu}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-xingliu_db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-xingliu-assets}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:?MINIO_PUBLIC_URL is required}
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID:?ALIYUN_ACCESS_KEY_ID is required}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET:?ALIYUN_ACCESS_KEY_SECRET is required}
      ALIYUN_GREEN_ENDPOINT: ${ALIYUN_GREEN_ENDPOINT:-green-cip.cn-shanghai.aliyuncs.com}
      ALIYUN_GREEN_REGION_ID: ${ALIYUN_GREEN_REGION_ID:-cn-shanghai}
      ALIYUN_GREEN_TEXT_SERVICE: ${ALIYUN_GREEN_TEXT_SERVICE:-ai_art_detection}
      ALIYUN_GREEN_IMAGE_SERVICE: ${ALIYUN_GREEN_IMAGE_SERVICE:-baselineCheck}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:?OPENAI_BASE_URL is required}
      OPENAI_MODEL: ${OPENAI_MODEL:?OPENAI_MODEL is required}
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - xingliu_network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://localhost:3000/docs').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: xingliu-web-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 8080
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://server:3000}
    expose:
      - '8080'
    depends_on:
      - server
    networks:
      - xingliu_network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  creator:
    build:
      context: .
      dockerfile: Dockerfile.creator
    container_name: xingliu-creator-prod
    restart: always
    expose:
      - '8081'
    depends_on:
      - server
    networks:
      - xingliu_network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  caddy:
    image: caddy:2-alpine
    container_name: xingliu-caddy-prod
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - creator
      - server
    networks:
      - xingliu_network
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

volumes:
  postgres_data_prod:
  minio_data_prod:
  caddy_data:
  caddy_config:

networks:
  xingliu_network:
    driver: bridge
