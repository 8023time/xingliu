name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.25.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        env:
          DATABASE_URL: postgresql://xingliu:xingliu_password@localhost:5432/xingliu_db
        run: pnpm --filter @xingliu/server exec prisma validate

      - name: Build
        run: pnpm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/xingliu' }}
      DEPLOY_BRANCH: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy inputs
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$DEPLOY_SSH_PRIVATE_KEY"
          test -n "$PROD_ENV_FILE"

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload production env
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          printf '%s\n' "$PROD_ENV_FILE" > .env.production
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" .env.production "$DEPLOY_USER@$DEPLOY_HOST:/tmp/xingliu.env"

      - name: Upload release bundle
        run: |
          printf '%s\n' "${GITHUB_SHA}" > .deploy-revision
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.turbo' \
            --exclude='.next' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='coverage' \
            --exclude='*.log' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='server/.env' \
            -czf /tmp/xingliu-release.tgz .
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/xingliu-release.tgz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/xingliu-release.tgz"

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e; DEPLOY_DIR='$DEPLOY_PATH'; case \"\$DEPLOY_DIR\" in ''|'/') echo 'Invalid DEPLOY_PATH'; exit 1;; esac; mkdir -p \"\$DEPLOY_DIR\"; find \"\$DEPLOY_DIR\" -mindepth 1 -maxdepth 1 -exec rm -rf {} +; tar -xzf /tmp/xingliu-release.tgz -C \"\$DEPLOY_DIR\"; mv /tmp/xingliu.env \"\$DEPLOY_DIR/.env\"; cd \"\$DEPLOY_DIR\"; docker builder prune -af; docker image prune -af; docker compose --env-file .env -f docker/docker-compose.prod.yml build; docker compose --env-file .env -f docker/docker-compose.prod.yml up -d --force-recreate --remove-orphans; docker compose --env-file .env -f docker/docker-compose.prod.yml ps; docker image prune -af"
