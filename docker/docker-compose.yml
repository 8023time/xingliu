name: xingliu

services:
  postgres:
    image: postgres:16-alpine
    container_name: xingliu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-xingliu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xingliu_password}
      POSTGRES_DB: ${DB_NAME:-xingliu_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: xingliu-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-xingliu_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-xingliu_minio_password}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: xingliu-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-xingliu}:${DB_PASSWORD:-xingliu_password}@postgres:5432/${DB_NAME:-xingliu_db}
      JWT_SECRET: ${JWT_SECRET:-change-this-local-secret}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-xingliu_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-xingliu_minio_password}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-xingliu-assets}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000/xingliu-assets}
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID:-}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET:-}
      ALIYUN_GREEN_ENDPOINT: ${ALIYUN_GREEN_ENDPOINT:-green-cip.cn-shanghai.aliyuncs.com}
      ALIYUN_GREEN_REGION_ID: ${ALIYUN_GREEN_REGION_ID:-cn-shanghai}
      ALIYUN_GREEN_TEXT_SERVICE: ${ALIYUN_GREEN_TEXT_SERVICE:-ai_art_detection}
      ALIYUN_GREEN_IMAGE_SERVICE: ${ALIYUN_GREEN_IMAGE_SERVICE:-baselineCheck}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: xingliu-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://server:3000}
    ports:
      - '8080:8080'
    depends_on:
      - server

  creator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.creator
    container_name: xingliu-creator
    restart: unless-stopped
    ports:
      - '8081:8081'
    depends_on:
      - server

  caddy:
    image: caddy:2-alpine
    container_name: xingliu-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - creator
      - server

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
